<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mach 6 Report</title>
  <style>
    :root {
      --bg: #f7f7f3;
      --fg: #1d232b;
      --muted: #5b6470;
      --danger: #b42318;
      --bar: #0f766e;
      --bar-bg: #d9e5e3;
      --card: #ffffff;
      --line: #d8d8d0;
    }
    body {
      margin: 0;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--fg);
      background: linear-gradient(180deg, #f7f7f3 0%, #f2f5f8 100%);
    }
    main {
      max-width: none;
      margin: 0 auto;
    }
    .page-header {
      max-width: 980px;
      margin: 0 auto;
    }
    .report-body {
      max-width: 980px;
      margin: 0 auto;
    }
    body.compare-active .report-body {
      max-width: 1960px;
    }
    h1 {
      margin: 0 0 4px 0;
      font-size: 26px;
    }
    .title-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 4px;
    }
    .title-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .commit-line {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 14px;
      line-height: 1.4;
      white-space: nowrap;
    }
    .commit-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 4px;
      color: #053771;
      background: #ddf4ff;
      border: 1px solid #b6e3ff;
      border-radius: 6px;
      font-weight: 500;
    }
    .commit-pill-dirty {
      color: #9a3412;
    }
    .commit-tagline {
      color: var(--fg);
    }
    .subtitle {
      margin: 0 0 20px 0;
      color: var(--muted);
    }
    .status {
      margin: 0 0 14px 0;
      color: var(--muted);
    }
    .status.error {
      color: var(--danger);
      font-weight: 700;
    }
    .sort-controls {
      display: flex;
      gap: 8px;
      margin: 0 0 14px 0;
      flex-wrap: wrap;
    }
    .compare-controls {
      display: grid;
      gap: 12px;
      margin: 0 0 18px 0;
      padding: 14px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .compare-controls-title {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
    }
    .compare-controls-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .compare-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .compare-field {
      display: grid;
      gap: 6px;
    }
    .compare-field label {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .compare-select {
      width: 100%;
      min-width: 0;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--fg);
      font: inherit;
      font-size: 14px;
    }
    .compare-status {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }
    .compare-status.error {
      color: var(--danger);
      font-weight: 700;
    }
    .compare-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--fg);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .compare-btn:disabled {
      cursor: default;
      opacity: 0.65;
    }
    .compare-results {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }
    .compare-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }
    .compare-column {
      min-width: 0;
    }
    .single-compare-column {
      min-width: 0;
      max-width: 980px;
    }
    .compare-column-header {
      margin: 0 0 8px 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .compare-header-commit {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, "Liberation Mono", monospace;
      text-transform: none;
      letter-spacing: 0;
    }
    .compare-header-branch {
      font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, "Liberation Mono", monospace;
      text-transform: none;
      letter-spacing: 0;
    }
    .compare-empty {
      margin: 0;
      padding: 18px 14px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
    }
    .sort-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--fg);
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .sort-btn.active {
      background: #e7f2ef;
      border-color: #8fb8af;
    }
    .site {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }
    summary {
      list-style: none;
      cursor: pointer;
    }
    summary::-webkit-details-marker {
      display: none;
    }
    .row {
      display: grid;
      grid-template-columns: 12px minmax(150px, 220px) minmax(260px, 1fr);
      align-items: start;
      gap: 12px;
    }
    .chevron {
      width: 0;
      height: 0;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-left: 7px solid var(--muted);
      transform: rotate(0deg);
      transform-origin: 40% 50%;
      transition: transform 120ms ease-out;
    }
    details[open] .chevron {
      transform: rotate(90deg);
    }
    .name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 600;
    }
    .summary-variants {
      display: grid;
      gap: 8px;
    }
    .variant-summary {
      display: grid;
      grid-template-columns: minmax(130px, 170px) minmax(120px, 1fr) 120px;
      align-items: center;
      gap: 10px;
    }
    .variant-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .bar-wrap {
      width: 100%;
      height: 28px;
      background: var(--bar-bg);
      overflow: hidden;
    }
    .bar-total {
      display: flex;
      height: 100%;
      min-width: 0;
    }
    .bar-seg {
      height: 100%;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      white-space: nowrap;
      font-size: 11px;
      color: #0f172a;
      font-weight: 600;
    }
    .seg-slow {
      background: #f59e0b;
    }
    .seg-bloom {
      background: #06b6d4;
    }
    .seg-fast {
      background: #ef4444;
    }
    .seg-slow-accept {
      background: #14b8a6;
    }
    .seg-share-check {
      background: #3b82f6;
    }
    .seg-share-insert {
      background: #8b5cf6;
    }
    .seg-query {
      background: #22c55e;
    }
    .seg-other {
      background: var(--bar);
    }
    .seg-index {
      background: #c2410c;
    }
    .seg-preprocess-other {
      background: #fb7185;
    }
    .bar-legend {
      margin-top: 8px;
      margin-left: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      color: var(--muted);
      font-size: 12px;
    }
    .expanded-chart {
      margin-bottom: 14px;
    }
    .expanded-chart h5 {
      margin: 0 0 8px 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }
    .expanded-bar-wrap {
      width: 100%;
      height: 32px;
      background: var(--bar-bg);
      overflow: hidden;
    }
    .expanded-bar-total {
      display: flex;
      width: 100%;
      height: 100%;
      min-width: 0;
    }
    .expanded-bar-seg {
      height: 100%;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      white-space: nowrap;
      font-size: 12px;
      color: #0f172a;
      font-weight: 700;
    }
    .expanded-legend {
      margin-top: 7px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      color: var(--muted);
      font-size: 12px;
    }
    .legend-warning {
      color: var(--danger);
      font-weight: 700;
    }
    .swatch {
      display: inline-block;
      width: 10px;
      height: 10px;
      margin-right: 6px;
      vertical-align: -1px;
    }
    .time {
      text-align: right;
      font-variant-numeric: tabular-nums;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }
    .time-value {
      font-variant-numeric: tabular-nums;
    }
    .time-value.warning {
      color: var(--danger);
      font-weight: 700;
    }
    .time-display-note {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.2;
    }
    .details {
      padding-top: 12px;
      margin-top: 10px;
      border-top: 1px solid var(--line);
    }
    .details-variants {
      display: grid;
      gap: 18px;
    }
    .variant-details {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fcfdfb;
    }
    .variant-details-title {
      margin: 0 0 12px 0;
      color: var(--fg);
      font-size: 14px;
      font-weight: 700;
    }
    .selector-breakdown {
      margin-top: 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 10px;
      background: #fafcfb;
    }
    .selector-breakdown > summary {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }
    .selector-breakdown > summary::before {
      content: "";
      width: 0;
      height: 0;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-left: 7px solid var(--muted);
      transform: rotate(0deg);
      transform-origin: 40% 50%;
      transition: transform 120ms ease-out;
      flex: 0 0 auto;
    }
    .selector-breakdown[open] > summary::before {
      transform: rotate(90deg);
    }
    .selector-breakdown-inner {
      margin-top: 8px;
    }
    .selector-breakdown-table {
      table-layout: fixed;
      width: 100%;
      max-width: 100%;
    }
    .selector-breakdown-table code {
      white-space: nowrap;
    }
    .selector-breakdown-table th,
    .selector-breakdown-table td {
      width: auto;
      max-width: none;
    }
    .selector-breakdown-table .col-selector {
      width: 80%;
    }
    .selector-breakdown-table .col-time {
      width: 20%;
      white-space: nowrap;
    }
    .cell-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      max-width: 100%;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 600px;
    }
    th, td {
      text-align: left;
      padding: 4px 8px 4px 0;
      vertical-align: top;
    }
    th {
      width: 260px;
      color: var(--muted);
      font-weight: 600;
    }
    p {
      margin: 10px 0 0 0;
    }
    @media (max-width: 700px) {
      .title-row {
        align-items: flex-start;
      }
      .title-meta {
        width: 100%;
      }
      .commit-line {
        white-space: normal;
      }
      .row {
        grid-template-columns: 12px 1fr;
        gap: 6px;
      }
      .summary-variants {
        grid-column: 2 / 3;
      }
      .bar-legend {
        margin-left: 18px;
      }
      .variant-summary {
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .compare-controls-grid {
        grid-template-columns: 1fr;
      }
      .compare-row {
        grid-template-columns: 1fr;
      }
      .expanded-bar-wrap {
        height: 28px;
      }
      .time {
        text-align: left;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="page-header">
      <div class="title-row">
        <h1>Mach 6 Benchmark Report</h1>
        <div id="report-commit-line" class="commit-line" hidden></div>
      </div>
      <p class="subtitle">Each row shows total runtime; expand for detailed selector statistics.</p>
      <p id="report-status" class="status">Loading report data...</p>
      <section id="compare-controls" class="compare-controls" hidden aria-labelledby="compare-controls-title">
        <h2 id="compare-controls-title" class="compare-controls-title">Compare Reports</h2>
        <div class="compare-controls-grid">
          <div class="compare-field">
            <label for="compare-left">Left report</label>
            <select id="compare-left" class="compare-select">
              <option>Loading available reports...</option>
            </select>
          </div>
          <div class="compare-field">
            <label for="compare-right">Right report</label>
            <select id="compare-right" class="compare-select">
              <option>Loading available reports...</option>
            </select>
          </div>
      </div>
      <div class="compare-actions">
        <button id="compare-left-only" class="compare-btn" type="button">Left Only</button>
        <button id="compare-run" class="compare-btn" type="button">Compare</button>
        <button id="compare-right-only" class="compare-btn" type="button">Right Only</button>
      </div>
        <p id="compare-status" class="compare-status" hidden></p>
      </section>
    </div>
    <div class="report-body">
      <div id="sort-controls" class="sort-controls" role="group" aria-label="Sort websites">
        <button id="sort-total" class="sort-btn" type="button">Sort by Overall Time</button>
        <button id="sort-slow" class="sort-btn" type="button">Sort by Slow-Reject Time</button>
      </div>
      <div id="compare-sort-controls" class="sort-controls" role="group" aria-label="Sort compared websites" hidden>
        <button id="compare-sort-left-total" class="sort-btn" type="button">Left Overall Time</button>
        <button id="compare-sort-left-slow" class="sort-btn" type="button">Left Slow-Reject Time</button>
        <button id="compare-sort-right-total" class="sort-btn" type="button">Right Overall Time</button>
        <button id="compare-sort-right-slow" class="sort-btn" type="button">Right Slow-Reject Time</button>
      </div>
      <section id="websites-list"></section>
      <section id="compare-results" class="compare-results" hidden></section>
    </div>
  </main>
  <script src="report.js"></script>
</body>
</html>
